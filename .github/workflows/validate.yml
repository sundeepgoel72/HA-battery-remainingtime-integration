name: Validate

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant pytest pytest-homeassistant-custom-component ruff
      - name: Syntax validation
        run: python -m compileall custom_components tests
      - name: Manifest validation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("custom_components/battery_remaining_time/manifest.json").read_text())
          hacs = json.loads(Path("hacs.json").read_text())

          required_manifest = {
              "domain",
              "name",
              "config_flow",
              "documentation",
              "issue_tracker",
              "version",
              "iot_class",
              "homeassistant",
          }
          missing_manifest = sorted(required_manifest - manifest.keys())
          if missing_manifest:
              raise SystemExit(f"manifest.json missing keys: {missing_manifest}")
          if manifest["domain"] != "battery_remaining_time":
              raise SystemExit("manifest.json domain mismatch")
          if manifest["iot_class"] != "local_polling":
              raise SystemExit("manifest.json iot_class must be local_polling")
          if hacs.get("iot_class") != "local_polling":
              raise SystemExit("hacs.json iot_class must be local_polling")
          PY
      - name: Ruff
        run: ruff check custom_components/battery_remaining_time tests
      - name: Pytest
        run: pytest -q

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
